<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <center>
    <h1> My Vue3 </h1>
    <button id="changeAgeBtn">Change age</button>
  </center>
  <script src="../packages/reactivity/dist/reactivity.global.js"></script>
  <script>
    let { reactive, shallowReactive, readonly, shallowReadonly, effect } = reactivity
    let info = { name: "Ton", age: 22, address: {country: "China", address:{city:"ShangHai", street: "长江南路"}}}
    let proxy = reactive(info);


    effect(() => {
      console.log(proxy.name)
    })
    document.getElementById("changeAgeBtn").addEventListener("click", function(){
      proxy.age = 24
      proxy.profession = "coder"
    })
    setTimeout(() => {
      proxy.name = "Gton";
      proxy.name = "gTon";
      proxy.name = "gton";
      proxy.name = "GTon";
    }, 1500);
  </script>
</body>
</html>
